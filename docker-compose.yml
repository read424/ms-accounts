version: '3.9'

services:
  mongodb:
    image: mongo:8.3.4
    container_name: mongodb-accounts
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: bootcamp_accounts_prod_2024
      MONGO_INITDB_DATABASE: ms_accounts_prod
    volumes:
      - ./init-mongo.sh:/docker-entrypoint-initdb.d/init-mongo.sh:ro
      - mongodb_accounts_data:/data/db
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - bootcamp-network
    healthcheck:
      test: echo 'db.adminCommand("ping")' | mongosh -u admin -p bootcamp_accounts_prod_2024 localhost:27017/admin
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2.4-alpine
    container_name: redis-accounts
    restart: unless-stopped
    ports:
      - "6380:6379"
    command: redis-server --requirepass eYVX7EwVmmxKPCDmwMtyKVge8oLd2t81
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - bootcamp-network
    healthcheck:
      test: redis-cli -a eYVX7EwVmmxKPCDmwMtyKVge8oLd2t81 ping
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:4.2.0
    container_name: kafka_broker
    restart: unless-stopped
    ports:
      - "9094:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_CLUSTER_ID: 'r4zt_wrqTRuT7W2NJsB_GA'

      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka_broker:9093'

      KAFKA_LISTENERS: 'PLAINTEXT://kafka_broker:9092,CONTROLLER://kafka_broker:9093'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka_broker:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'

      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_BYTES: 1073741824
      KAFKA_LOG_RETENTION_MS: 604800000
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    volumes:
      - kafka_data:/var/lib/kafka/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: kafka-broker-api-versions.sh --bootstrap-server localhost:9092
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bootcamp-network

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: kafka_ui
    restart: always
    ports:
      - "8881:8080"
    environment:
      AUTH_TYPE: "DISABLED"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka_broker:9092
      KAFKA_CLUSTERS_0_NAME: bootcamp-cluster
      KAFKA_CLUSTERS_0_METRICS_PORT: 9092
    depends_on:
      - kafka
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "2"
    networks:
      - bootcamp-network

  ms-accounts:
    build:
      context: .
      dockerfile: Dockerfile
    image: read424/ms-accounts:v1.0.0
    container_name: ms-accounts
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_CONFIG_IMPORT: configserver:http://service-config-server:8888
      EUREKA_CLIENT_SERVICE_URL_DEFAULT_ZONE: http://service-eureka:8761/eureka/
      SPRING_REDIS_HOST: redis-accounts
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: eYVX7EwVmmxKPCDmwMtyKVge8oLd2t81
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka_broker:9092
      JAVA_OPTS: -Xmx512m -Xms256m
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - bootcamp-network

volumes:
  mongodb_accounts_data:
  kafka_data:

networks:
  bootcamp-network:
    name: bootcamp-network
    external: true
